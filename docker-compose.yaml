services:
  hmcatcher:
    build:
      context: .
    expose:
      - "3000"
    volumes:
      - hmcatcher-data:/data
    environment:
      - NODE_ENV=production
      - SETTINGS_DIR=/data
      - MESSAGING_PROVIDER=${MESSAGING_PROVIDER:-gowa}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_TEST_PHONE_NUMBER_ID=${WHATSAPP_TEST_PHONE_NUMBER_ID}
      - WHATSAPP_WEBHOOK_VERIFY_TOKEN=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOWA_BASE_URL=${GOWA_BASE_URL}
      - GOWA_USERNAME=${GOWA_USERNAME}
      - GOWA_PASSWORD=${GOWA_PASSWORD}
      - GOWA_DEVICE_ID=${GOWA_DEVICE_ID}
      - GOWA_WEBHOOK_SECRET=${GOWA_WEBHOOK_SECRET:-secret}
      - GOWA_PHONE_NUMBER=${GOWA_PHONE_NUMBER}
      - TELEGRAM_BOT_USERNAME=${TELEGRAM_BOT_USERNAME:-hmcatcher_bot}
      - WHATSAPP_PHONE_NUMBER=${WHATSAPP_PHONE_NUMBER}
      - APP_BASE_URL=${APP_BASE_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_URL=${AUTH_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      - AUTHENTIK_ISSUER=${AUTHENTIK_ISSUER}
      - AUTHENTIK_CLIENT_ID=${AUTHENTIK_CLIENT_ID}
      - AUTHENTIK_CLIENT_SECRET=${AUTHENTIK_CLIENT_SECRET}
      - AUTHENTIK_ADMIN_GROUP=${AUTHENTIK_ADMIN_GROUP:-Messe Admins}
      - MQTT_URL=${MQTT_URL}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}

volumes:
  hmcatcher-data:
